<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E2C06A"/>
      <stop offset="100%" style="stop-color:#C9A042"/>
    </linearGradient>
  </defs>

  <!-- Background: rounded square -->
  <rect width="512" height="512" rx="96" ry="96" fill="#05080D"/>
  <!-- Border ring -->
  <rect width="512" height="512" rx="96" ry="96"
        fill="none" stroke="url(#goldGrad)" stroke-width="8" opacity="0.5"/>

  <!-- Globe outline circle -->
  <circle cx="256" cy="256" r="168"
          fill="none" stroke="url(#goldGrad)" stroke-width="14" opacity="0.85"/>
  <!-- Equator line -->
  <line x1="96" y1="256" x2="416" y2="256"
        stroke="url(#goldGrad)" stroke-width="10" opacity="0.6"/>
  <!-- Longitude oval -->
  <ellipse cx="256" cy="256" rx="70" ry="168"
           fill="none" stroke="url(#goldGrad)" stroke-width="10" opacity="0.55"/>

  <!-- Letter D — centered, bold, premium -->
  <path d="M192 148
           L192 364
           L248 364
           C316 364 366 314 366 256
           C366 198 316 148 248 148
           Z"
        fill="none"
        stroke="url(#goldGrad)"
        stroke-width="28"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
